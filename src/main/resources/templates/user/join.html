<%@ page contentType="text/html;charset=UTF-8" language="java" %>
    <%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core" %>
        <!DOCTYPE html>

        <html>

        <head>
            <meta charset="UTF-8">
            <title>회원가입</title>
            <link rel="stylesheet" href="${pageContext.request.contextPath}/css/join.css" />
            <script src="${pageContext.request.contextPath}/js/join.js"></script>

        </head>

        <body>
            <div class="join-container">
                <form method="post" enctype="multipart/form-data">

                    <table class="join-table">
                        <caption>회원가입</caption>

                        <tr>
                            <th>회원 구분</th>
                            <td>
                                <input type="radio" name="role" value="USER" 
                                id="user" checked>
                                <label for="user">일반회원</label>

                                <input type="radio" name="role" value="SELLER" 
                                id="seller">
                                <label for="seller">판매자</label>
                            </td>
                        </tr>

                        <tr>
                            <th>아이디</th>
                            <td>

                                <div class="input-row">

                                    <input name="id" id="id" onchange="chk()" 
                                    placeholder="아이디를 입력하세요" />

                                    <input type="button" value="중복체크" 
                                    class="btn-secondary" onclick="check_id()" />

                                </div>
                            </td>


                        </tr>

                        <tr>
                            <th>이메일(본인인증)</th>
                            <td>
                                <div class="input-row">

                                    <input name="userEmail" id="authEmail" 
                                    placeholder="email을 입력하세요" />
                                    <input type="button" value="전송" 
                                    class="btn-secondary"
                                        onclick="mailCheck(this.form)" />
                                </div>

                                <div class="input-row">
                                    <input id="check_input" placeholder="인증번호 6자리"
                                     maxlength="6" disabled="disabled" />

                                    <input type="button" value="인증" 
                                    onclick="change_input()" />
                                </div>
                            </td>
                        </tr>

                        <tr>
                            <th>이름</th>
                            <td><input name="name" /></td>
                        </tr>

                        <tr>
                            <th>비밀번호</th>
                            <td><input name="password" type="password" 
                                placeholder="영문, 숫자 포함 8자 이상" /></td>
                        </tr>

                                     <tr>
                            <th>비밀번호 확인</th>
                            <td><input name="check_password" type="password" 
                                placeholder="영문, 숫자 포함 8자 이상" /></td>
                        </tr>

                        <tr>
                            <th>전화번호</th>
                            <td>
                                <input name="phone" />
                            </td>
                        </tr>

                        <tr>
                            <th>성별</th>
                            <td>
                                <input type="radio" name="gender"
                                 value="male" id="male" checked>
                                <label for="male">남자</label>

                                <input type="radio" name="gender"
                                 value="female" id="female">
                                <label for="female">여자</label>
                            </td>
                        </tr>

                        <tr>
                            <td colspan="2" align="center">
                                <input type="button" value="가입" 
                                class="btn-main" onclick="send(this.form)" />

                                <input type="button" value="취소" 
                                class="btn-cancel" onclick="history.back()" />
                            </td>
                        </tr>

                    </table>


                </form>
            </div>
        </body>

        </html>
